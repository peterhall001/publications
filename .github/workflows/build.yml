name: Build publications

on:
  schedule:
    - cron: "30 6 * * *"   # daily, 06:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: build-publications
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZOTERO_GROUP_ID: "4536042"
      ZOTERO_COLLECTION_ID: ${{ secrets.ZOTERO_COLLECTION_ID }}
      ZOTERO_REVIEW_COLLECTION_ID: ${{ secrets.ZOTERO_REVIEW_COLLECTION_ID }}
      ZOTERO_REJECTED_COLLECTION_ID: ${{ secrets.ZOTERO_REJECTED_COLLECTION_ID }}
      ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
      OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyzotero

      - name: Build publications.json from the approved collection
        run: python scripts/build_publications.py publications.json

      - name: Discover new candidates and add them to the Zotero Review collection
        run: python scripts/discover_candidates.py

      - name: Update Zotero Review issue when new candidates are found
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REVIEW_NOTIFICATION_USER: peterhall001
          ZOTERO_REVIEW_URL: https://www.zotero.org/groups/4536042/items/collectionKey/69RXNW6D
        run: python scripts/update_review_issue.py

      - name: Commit logs if changed
        run: |
          git config user.name  "eci-publications-bot"
          git config user.email "eci-publications-bot@users.noreply.github.com"
          git add publications.json candidates.json candidates_for_review.md
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update publications and review queue ($(date -u +%Y-%m-%d))"
            git push
          fi
